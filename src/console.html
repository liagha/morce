<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>morce terminal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #0f0; font-family: 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; }
        #output { flex: 1; overflow-y: auto; padding: 12px; white-space: pre-wrap; word-break: break-all; }
        #input-line { display: flex; align-items: center; padding: 8px 12px; border-top: 1px solid #1a1a1a; }
        .prompt { color: #0f0; margin-right: 8px; user-select: none; }
        #input { background: transparent; border: none; color: #0f0; font-family: 'Courier New', monospace; font-size: 14px; flex: 1; outline: none; }
        #suggest { color: #0a0; font-size: 13px; padding: 4px 12px; border-top: 1px solid #1a1a1a; min-height: 22px; max-height: 40px; overflow-y: auto; }

        /* Syntax highlighting */
        .syn-cmd { color: #00ff00; font-weight: bold; }
        .syn-key { color: #00ccff; }
        .syn-val { color: #ffaa00; }
        .syn-id { color: #ff66ff; }
        .syn-load { color: #cccccc; }
        .syn-error { color: #ff4444; font-weight: bold; }
        .syn-info { color: #888888; }
        .syn-success { color: #44ff44; }

        /* File upload */
        #drop-zone {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 255, 0, 0.1);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            border: 2px dashed #0f0;
            pointer-events: none;
        }
        #drop-zone.active {
            display: flex;
        }
        #drop-zone-text {
            background: #0a0a0a;
            padding: 20px;
            border: 1px solid #0f0;
            font-family: 'Courier New', monospace;
            font-size: 18px;
        }

        /* Scrollbar styling */
        #output::-webkit-scrollbar {
            width: 8px;
        }
        #output::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        #output::-webkit-scrollbar-thumb {
            background: #1a1a1a;
            border: 1px solid #0f0;
        }
    </style>
</head>
<body>
<div id="output"></div>
<div id="suggest"></div>
<div id="input-line"><span class="prompt">&gt;</span><input id="input" autofocus></div>
<div id="drop-zone">
    <div id="drop-zone-text">DROP FILE TO UPLOAD</div>
</div>
<script>
    const out = document.getElementById('output');
    const suggest = document.getElementById('suggest');
    const inp = document.getElementById('input');
    const dropZone = document.getElementById('drop-zone');

    // Command history
    let history = [];
    let historyIndex = -1;
    let currentInput = '';

    // Load history from localStorage
    try {
        const saved = localStorage.getItem('morce_history');
        if (saved) history = JSON.parse(saved);
    } catch(e) {}

    function addToHistory(cmd) {
        if (cmd && (history.length === 0 || history[history.length-1] !== cmd)) {
            history.push(cmd);
            if (history.length > 1000) history.shift();
            // Save to localStorage
            try {
                localStorage.setItem('morce_history', JSON.stringify(history));
            } catch(e) {}
        }
        historyIndex = history.length;
    }

    // Syntax highlighting for output
    function log(text, className) {
        if (className) {
            out.innerHTML += `<span class="${className}">${escapeHtml(text)}</span>\n`;
        } else {
            // Auto-highlight based on content
            let highlighted = escapeHtml(text);

            // Highlight IDs
            highlighted = highlighted.replace(/^id:(.+)$/gm, '<span class="syn-id">id:$1</span>');

            // Highlight tags
            highlighted = highlighted.replace(/^tags:(.+)$/gm, (match, tags) => {
                const parts = tags.split(',').map(pair => {
                    const eq = pair.indexOf('=');
                    if (eq > 0) {
                        const key = pair.slice(0, eq);
                        const val = pair.slice(eq + 1);
                        return `<span class="syn-key">${escapeHtml(key)}</span>=<span class="syn-val">${escapeHtml(val)}</span>`;
                    }
                    return escapeHtml(pair);
                });
                return 'tags:' + parts.join(',');
            });

            // Highlight load
            highlighted = highlighted.replace(/^load:(.+)$/gm, '<span class="syn-load">load:$1</span>');

            // Highlight errors
            if (text.includes('error') || text.includes('Error') || text.includes('not found') || text.includes('Forbidden')) {
                highlighted = `<span class="syn-error">${highlighted}</span>`;
            }

            out.innerHTML += highlighted + '\n';
        }
        out.scrollTop = out.scrollHeight;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function logCommand(cmd) {
        out.innerHTML += `<span class="prompt">&gt;</span> <span class="syn-cmd">${escapeHtml(cmd)}</span>\n`;
        out.scrollTop = out.scrollHeight;
    }

    let names = [];

    function tokenize(str) {
        let tokens = [];
        let current = '';
        let inQuotes = false;
        for (let ch of str) {
            if (ch === '"') { inQuotes = !inQuotes; current += ch; }
            else if (ch === ' ' && !inQuotes) { if (current) tokens.push(current); current = ''; }
            else { current += ch; }
        }
        if (current) tokens.push(current);
        return tokens;
    }

    function parseTagsAndLoad(tokens) {
        let tagList = [];
        let loadParts = [];
        for (let t of tokens) {
            let eq = t.indexOf('=');
            if (eq > 0 && t[0] !== '"') {
                let key = t.slice(0, eq);
                let val = t.slice(eq+1);
                if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1);
                tagList.push(key + '=' + val);
            } else {
                loadParts.push(t.replace(/^"|"$/g, ''));
            }
        }
        return { tags: tagList.join(','), load: loadParts.join(' ') };
    }

    async function fetchNames() {
        try {
            let resp = await fetch('/entities?kind=name');
            let text = await resp.text();
            let lines = text.split('\n');
            names = [];
            for (let line of lines) {
                if (line.startsWith('tags:')) {
                    let tagPart = line.slice(5);
                    let pairs = tagPart.split(',');
                    for (let pair of pairs) {
                        let eq = pair.indexOf('=');
                        if (eq > 0 && pair.slice(0,eq) === 'name') {
                            names.push(pair.slice(eq+1));
                        }
                    }
                }
            }
        } catch(e) {}
    }

    function addName(name) {
        if (!names.includes(name)) names.push(name);
    }

    async function resolveNames(raw) {
        let pattern = /@(\w[\w-]*)/g;
        let matches = [...raw.matchAll(pattern)];
        let resolved = raw;
        for (let match of matches) {
            let name = match[1];
            try {
                let query = 'kind=name&name=' + name;
                let resp = await fetch('/entities?' + query);
                let text = await resp.text();
                let lines = text.split('\n');
                let target = null;
                for (let line of lines) {
                    if (line.startsWith('tags:')) {
                        let tagPart = line.slice(5);
                        let pairs = tagPart.split(',');
                        for (let pair of pairs) {
                            let eq = pair.indexOf('=');
                            if (eq > 0) {
                                let k = pair.slice(0, eq);
                                let v = pair.slice(eq+1);
                                if (k === 'target') { target = v; break; }
                            }
                        }
                    }
                    if (target) break;
                }
                if (target) { resolved = resolved.replace(match[0], target); }
            } catch (e) {}
        }
        return resolved;
    }

    function autoCompleteNames(raw) {
        return raw.replace(/@(\w[\w-]*)/g, (match, prefix) => {
            if (prefix === '') return match;
            let found = names.filter(n => n.startsWith(prefix));
            if (found.length === 1) return '@' + found[0];
            return match;
        });
    }

    let commands = ['create', 'read', 'query', 'update', 'delete', 'ws', 'sub', 'help', 'upload'];
    let tagKeys = ['kind', 'name', 'in', 'from', 'to', 'by', 'on', 'at', 'title', 'target', 'body'];

    function completion(text) {
        let last = text.lastIndexOf(' ');
        let head = last < 0 ? '' : text.slice(0, last+1);
        let word = last < 0 ? text : text.slice(last+1);
        if (!word) return null;

        if (head.trim() === '') {
            let cmdMatch = commands.filter(c => c.startsWith(word));
            if (cmdMatch.length) return head + (cmdMatch.length === 1 ? cmdMatch[0] + ' ' : cmdMatch[0]);
        }

        if (word.startsWith('@')) {
            let prefix = word.slice(1);
            let match = names.filter(n => n.startsWith(prefix));
            return match.length === 1 ? head + '@' + match[0] + ' ' : (match.length ? head + '@' + match[0] : null);
        }

        if (word.endsWith('=')) return null;

        let lastEq = word.lastIndexOf('=');
        if (lastEq > 0) {
            let key = word.slice(0, lastEq);
            let val = word.slice(lastEq+1);
            if (key === 'kind') {
                let kinds = ['user', 'channel', 'msg', 'post', 'name', 'like', 'typing', 'read', 'setting', 'perm', 'session'];
                let match = kinds.filter(k => k.startsWith(val));
                return match.length === 1 ? head + key + '=' + match[0] + ' ' : (match.length ? head + key + '=' + match[0] : null);
            }
            return null;
        }

        let match = tagKeys.filter(k => k.startsWith(word));
        return match.length === 1 ? head + match[0] + '=' : (match.length ? head + match[0] : null);
    }

    function showSuggestion(text) {
        let comp = completion(text);
        if (comp) {
            suggest.innerHTML = `<span class="syn-info">${escapeHtml(comp)}</span>`;
        } else {
            suggest.textContent = '';
        }
    }

    // File upload handling
    let pendingFile = null;

    document.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('active');
    });

    document.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropZone.classList.remove('active');
    });

    document.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('active');

        const file = e.dataTransfer.files[0];
        if (file) {
            pendingFile = file;
            inp.value = 'upload ' + file.name;
            inp.focus();
            log(`File ready: ${file.name} (${formatBytes(file.size)})`, 'syn-info');
        }
    });

    function formatBytes(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    async function uploadFile(file, tags) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = async () => {
                try {
                    const headers = new Headers();
                    if (tags) headers.set('x-tags', tags);

                    const res = await fetch('/entities', {
                        method: 'POST',
                        headers,
                        body: reader.result
                    });
                    resolve(res);
                } catch (e) {
                    reject(e);
                }
            };
            reader.onerror = reject;
            reader.readAsArrayBuffer(file);
        });
    }

    inp.addEventListener('keydown', async (e) => {
        if (e.key === 'Tab') {
            e.preventDefault();
            let comp = completion(inp.value);
            if (comp) inp.value = comp;
            showSuggestion(inp.value);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (historyIndex > 0) {
                if (historyIndex === history.length) {
                    currentInput = inp.value;
                }
                historyIndex--;
                inp.value = history[historyIndex];
            }
        } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyIndex < history.length - 1) {
                historyIndex++;
                inp.value = history[historyIndex];
            } else if (historyIndex === history.length - 1) {
                historyIndex = history.length;
                inp.value = currentInput;
            }
        } else if (e.key === 'Escape') {
            inp.value = '';
            suggest.textContent = '';
        } else if (e.key === 'Enter') {
            let raw = inp.value.trim();
            inp.value = '';
            suggest.textContent = '';
            if (!raw) return;
            addToHistory(raw);
            await execute(raw);
        }
    });

    inp.addEventListener('input', () => showSuggestion(inp.value));

    async function execute(raw) {
        logCommand(raw);

        // Handle upload command
        if (raw.startsWith('upload ')) {
            if (!pendingFile) {
                log('No file selected. Drag and drop a file first.', 'syn-error');
                return;
            }

            const rest = raw.slice(7).trim();
            const tokens = tokenize(rest);
            const { tags } = parseTagsAndLoad(tokens);

            log(`Uploading ${pendingFile.name}...`, 'syn-info');

            try {
                const res = await uploadFile(pendingFile, tags);
                if (res.headers.has('x-entity-id')) {
                    let newId = res.headers.get('x-entity-id');
                    let newTags = res.headers.get('x-entity-tags') || '';
                    log('id:' + newId, 'syn-id');
                    log('tags:' + newTags, 'syn-info');
                    log(`File uploaded successfully (${formatBytes(pendingFile.size)})`, 'syn-success');

                    let createdTags = {};
                    newTags.split(',').forEach(pair => {
                        let eq = pair.indexOf('=');
                        if (eq > 0) createdTags[pair.slice(0,eq)] = pair.slice(eq+1);
                    });
                    if (createdTags['name']) {
                        let name = createdTags['name'];
                        let nameHeaders = new Headers();
                        nameHeaders.set('x-tags', 'kind=name,name=' + name + ',target=' + newId);
                        await fetch('/entities', { method: 'POST', headers: nameHeaders });
                        addName(name);
                        log('(name registered: ' + name + ')', 'syn-info');
                    }
                } else {
                    log(`Upload failed: ${res.status} ${res.statusText}`, 'syn-error');
                }
            } catch (e) {
                log(`Upload error: ${e.message}`, 'syn-error');
            }

            pendingFile = null;
            return;
        }

        let viaExact = await resolveNames(raw);
        let viaPrefix = autoCompleteNames(viaExact);
        if (viaPrefix !== viaExact) log('(partial name resolved)', 'syn-info');
        raw = viaPrefix;

        if (raw.startsWith('@') && raw.indexOf(' ') === -1) {
            raw = 'read ' + raw;
        }

        let space = raw.indexOf(' ');
        let cmd = space < 0 ? raw.toLowerCase() : raw.slice(0, space).toLowerCase();
        let rest = space < 0 ? '' : raw.slice(space+1).trim();

        if (cmd === 'create' || cmd === 'update') {
            let isUpdate = cmd === 'update';
            let id = '';
            let remainder = rest;
            if (isUpdate) {
                let firstSpace = rest.indexOf(' ');
                id = firstSpace < 0 ? rest : rest.slice(0, firstSpace);
                remainder = firstSpace < 0 ? '' : rest.slice(firstSpace+1).trim();
            }
            let tokens = tokenize(remainder);
            let { tags, load } = parseTagsAndLoad(tokens);
            let headers = new Headers();
            if (tags) headers.set('x-tags', tags);
            let url = isUpdate ? '/entities/' + id : '/entities';
            let method = isUpdate ? 'PUT' : 'POST';

            try {
                let res = await fetch(url, { method, headers, body: load });
                if (res.headers.has('x-entity-id')) {
                    let newId = res.headers.get('x-entity-id');
                    let newTags = res.headers.get('x-entity-tags') || '';
                    let loadText = await res.text();
                    log('id:' + newId, 'syn-id');
                    log('tags:' + newTags);
                    log('load:' + loadText, 'syn-load');
                    if (!isUpdate) {
                        let createdTags = {};
                        newTags.split(',').forEach(pair => {
                            let eq = pair.indexOf('=');
                            if (eq > 0) createdTags[pair.slice(0,eq)] = pair.slice(eq+1);
                        });
                        if (createdTags['name']) {
                            let name = createdTags['name'];
                            let nameHeaders = new Headers();
                            nameHeaders.set('x-tags', 'kind=name,name=' + name + ',target=' + newId);
                            await fetch('/entities', { method: 'POST', headers: nameHeaders });
                            addName(name);
                            log('(name registered: ' + name + ')', 'syn-info');
                        }
                    }
                } else {
                    log(`Error: ${res.status} ${res.statusText}`, 'syn-error');
                    try {
                        let errorBody = await res.text();
                        if (errorBody) log(errorBody, 'syn-error');
                    } catch(e) {}
                }
            } catch (e) {
                log(`Network error: ${e.message}`, 'syn-error');
            }
        } else if (cmd === 'read' && rest) {
            let id = rest.split(/\s/)[0];
            try {
                let res = await fetch('/entities/' + id);
                if (res.headers.has('x-entity-id')) {
                    log('id:' + res.headers.get('x-entity-id'), 'syn-id');
                    log('tags:' + (res.headers.get('x-entity-tags') || ''));
                    log('load:' + await res.text(), 'syn-load');
                } else {
                    log(`Error: ${res.status} ${res.statusText}`, 'syn-error');
                    try {
                        let errorBody = await res.text();
                        if (errorBody) log(errorBody, 'syn-error');
                    } catch(e) {}
                }
            } catch (e) {
                log(`Network error: ${e.message}`, 'syn-error');
            }
        } else if (cmd === 'query') {
            let query = rest.replace(/"/g, '').replace(/\s+/g, '&');
            try {
                let res = await fetch('/entities?' + query);
                let text = await res.text();
                if (text.trim()) {
                    log(text.trim());
                } else {
                    log('(no results)', 'syn-info');
                }
            } catch (e) {
                log(`Query error: ${e.message}`, 'syn-error');
            }
        } else if (cmd === 'delete' && rest) {
            let id = rest.split(/\s/)[0];
            try {
                let res = await fetch('/entities/' + id, { method: 'DELETE' });
                if (res.ok) {
                    log(`Entity ${id} deleted`, 'syn-success');
                } else {
                    log(`Error: ${res.status} ${res.statusText}`, 'syn-error');
                }
                await fetchNames();
            } catch (e) {
                log(`Delete error: ${e.message}`, 'syn-error');
            }
        } else if (cmd === 'ws') {
            try {
                let ws = new WebSocket('ws://' + location.host + '/ws');
                ws.onopen = () => log('WebSocket connected', 'syn-success');
                ws.onmessage = (msg) => {
                    if (msg.data.startsWith('id:')) {
                        log('push:', 'syn-info');
                        log(msg.data);
                    }
                };
                ws.onclose = () => log('WebSocket closed', 'syn-info');
                ws.onerror = () => log('WebSocket error', 'syn-error');
                window._ws = ws;
            } catch (e) {
                log(`WebSocket error: ${e.message}`, 'syn-error');
            }
        } else if (cmd === 'sub' && window._ws) {
            let filter = rest.replace(/"/g, '').replace(/\s+/g, '&');
            window._ws.send(filter);
            log(`Subscribed to: ${filter}`, 'syn-success');
        } else if (cmd === 'help') {
            log('┌─────────────────────────────────────────────┐', 'syn-info');
            log('│ morce terminal commands                      │', 'syn-info');
            log('├─────────────────────────────────────────────┤', 'syn-info');
            log('│ create key=val ... [load]                    │', 'syn-info');
            log('│ read <id>                                    │', 'syn-info');
            log('│ query key=val[&...]                          │', 'syn-info');
            log('│ update <id> key=val... [load]                │', 'syn-info');
            log('│ delete <id>                                  │', 'syn-info');
            log('│ ws                                           │', 'syn-info');
            log('│ sub key=val[&...]                            │', 'syn-info');
            log('│ upload [tags]                                │', 'syn-info');
            log('│ help                                         │', 'syn-info');
            log('├─────────────────────────────────────────────┤', 'syn-info');
            log('│ ↑↓ arrow keys: command history               │', 'syn-info');
            log('│ Tab: autocomplete                            │', 'syn-info');
            log('│ @name: resolve entity by name                │', 'syn-info');
            log('│ Drag & drop: file upload                     │', 'syn-info');
            log('└─────────────────────────────────────────────┘', 'syn-info');
        } else {
            log('Unknown command. Type "help" for available commands.', 'syn-error');
        }
    }

    fetchNames();
    log('┌─────────────────────────────────────────────┐', 'syn-info');
    log('│ Welcome to morce terminal                    │', 'syn-cmd');
    log('│ Type "help" for commands                     │', 'syn-info');
    log('│ Tab to autocomplete                          │', 'syn-info');
    log('│ @names auto-resolve on enter                 │', 'syn-info');
    log('│ Drag files to upload                         │', 'syn-info');
    log('└─────────────────────────────────────────────┘', 'syn-info');
</script>
</body>
</html>
